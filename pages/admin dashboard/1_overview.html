<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Overview</title>
      <link rel="stylesheet" href="styles/admin-dashboard.css">
</head>

<body>

<header class="header">
      <div class="logo">wala pa</div>

      <div class="nav-bar">
          <nav>
            <a href="pages/admin dashboard/1_overview.html">Overview</a>
            <a href="pages/admin dashboard/2_user_management.html">User Management</a>
            <a href="pages/admin dashboard/3_pet_records.html">Pet Records</a>
          </nav>
      </div>

    <div class="admin-info">
    <span class="admin">ADMIN<br><small>@ FurPaws</small></span>
    <button class="logout" onclick="logout()">⏻</button>
  </div>
</header>

  <main class="admin-dashboard">

    <h2>ADMIN DASHBOARD ● ● ●</h2>

  <section class="card pet-demographics">
    <h3>PET DEMOGRAPHICS</h3>
    <div class="inner-grid">
      <div class="sub-card">Species Chart</div>
      <div class="sub-card">Age Group Chart</div>
    </div>
  </section>

  <section class="card status-section">
    <div class="sub-card">Vaccination Status</div>
    <div class="sub-card">Neuter/Spay Status</div>
  </section>

  <aside class="side-panel">
    <div class="pending">
          <h2>Pending Approvals</h2>
          <ul id="pendings">
            <nav class="pending-nav">
              <a href="pages/admin dashboard/4_pending_approvals.html" class="btn-link">See More</a>
            </nav>
    </div>
    <div class="overdue">
          <h2>Overdue Registrations</h2>
          <p>Number of Pets with Overdue Registration: <span id="display-count">0</span></p>
    </div>
  </aside>

  <footer class="card registration-summary">
    <h2>PET REGISTRATION SUMMARY</h2>
        <div class="chart-box">
            <!-- wala pa -->
      </div>
  </footer>

  </main>

  <script src="scripts/admin-dashboard.js"></script>
</body>
</html>
