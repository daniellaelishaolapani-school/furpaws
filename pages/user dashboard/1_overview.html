
<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>User Dashboard - Overview</title>
      <link rel="stylesheet" href="../../styles/user-dashboard.css">
</head>

<body>
      <nav class="dashboard-navbar">
            <img class="dashboard-navbar-logo" src="../../assets/img/1.png">

            <div class="dashboard-navbar-tabs">
                  <a href="1_overview.html" class="dashboard-tab-active">OVERVIEW</a>
                  <a href="2_my_pets.html" class="dashboard-tab-inactive">MY PETS</a>
                  <a href="3_edit_profile.html" class="dashboard-tab-inactive">EDIT PROFILE</a>
            </div>

            <div class="dashboard-navbar-user">
                  <div class="dashboard-navbar-user-icon">
                        <img src="../../assets/svg/avatar icon - dashboard.svg">
                  </div>

                  <div class="dashboard-navbar-user-info">
                        <p class="dashboard-navbar-user-name"></p>
                        <p class="dashboard-navbar-user-email"></p>
                  </div>

                  <button class="dashboard-navbar-logout">
                        <img src="../../assets/svg/power button icon.svg">
                  </button>
            </div>
      </nav>

      <main>
            <p class="overview-header">USER DASHBOARD • • •</p>

            <div class="overview-container">

                  <div class="overview-my-pets-grid">
                        <div class="overview-my-pets-grid-header">
                              <p>MY PETS</p>
                              <a href="2_my_pets.html" class="overview-my-pets-grid-see-more">SEE MORE</a>
                        </div>
                  </div>

                  <div class="upcoming-reminders-grid">
                        <p>UPCOMING REMINDERS</p>
                        <ul class="dashboard-list">
                              <li>• • • • • </li>
                              <li>• • • • • </li>
                              <li>• • • • • </li>
                        </ul>
                  </div>

                  <div class="recent-activities-grid">
                        <p>RECENT ACTIVITIES</p>
                        <ul class="dashboard-list">
                              <li>• • • • • </li>
                              <li>• • • • • </li>
                              <li>• • • • • </li>
                        </ul>
                  </div>

                  <div class="register-pet-container">
                        <div class="register-pet-left">
                              <p>REGISTER A PET</p>
                              <button type="submit" form="register-pet-form" class="register-now-button">REGISTER NOW</button>
                        </div>

                        <div class="register-pet-divider"></div>

                        <form class="register-pet-form" id="register-pet-form">
                              <div class="register-pet-form-row">
                                    <div class="register-pet-form-field">
                                          <label>PET'S NAME *</label>
                                          <div class="pet-name">
                                                <input type="text">
                                          </div>
                                    </div>

                                    <div class="register-pet-form-field-dropdown">                                          
                                          <label>MALE/FEMALE *</label>
                                          <div class="pet-sex">
                                                <select>
                                                      <option value=""></option>
                                                      <option value="male">MALE</option>
                                                      <option value="female">FEMALE</option>
                                                </select>
                                          </div>
                                    </div>

                                    <div class="register-pet-form-field-dropdown">
                                          <label>PET'S SPECIES *</label>
                                          <select>
                                                <option value=""></option>
                                                <option value="dog">DOG</option>
                                                <option value="cat">CAT</option>
                                                <option value="others">OTHERS</option>
                                          </select>
                                    </div>

                                    <div class="register-pet-form-field">
                                          <label>PET'S BREED *</label>
                                          <input type="text">
                                    </div>

                                    <div class="register-pet-form-field">
                                          <label>NOTES (optional)</label>
                                          <input type="text">
                                    </div>
                              </div>

                              <div class="register-pet-form-row">
                                    <div class="register-pet-form-field">
                                          <label>PET'S BIRTHDAY (leave blank if unknown)</label>
                                          <input type="text" placeholder="MM/DD/YYYY">
                                    </div>

                                    <div class="register-pet-form-field">
                                          <label>PET'S AGE (or estimated age)</label>
                                          <input type="text">
                                    </div>

                                    <div class="register-pet-form-field-dropdown">
                                          <label>VACCINATED?</label>

                                          <select>
                                                <option value=""></option>
                                                <option value="yes">YES</option>
                                                <option value="no">NO</option>
                                          </select>
                                    </div>

                                    <div class="register-pet-form-field-dropdown">
                                          <label>NEUTERED/SPAYED?</label>

                                          <select>
                                                <option value=""></option>
                                                <option value="neutered">NEUTERED</option>
                                                <option value="spayed">SPAYED</option>
                                                <option value="neither">NEITHER</option>
                                          </select>
                                    </div>
                              </div>
                        </form>
                  </div>
            </div>
      </main>

      <script src="../../scripts/user-dashboard.js"></script>
</body>

</html>
