
<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sign Up</title>
      <link rel="stylesheet" href="../../styles/user-authorization.css">
</head>

<body>
      <img class="sign-up-background" src="../../assets/img/sign up background.jpg">

      <a class="sign-up-logo" href="../../index.html">
            <img src="../../assets/svg/about us paw print 1.svg">
      </a>

      <div class="sign-up-card">
            <div class="sign-up-card-header">
                  <p class="sign-up-card-header-subtitle">GET STARTED FOR FREE</p>
                  <p class="sign-up-card-header-title">CREATE A USER ACCOUNT</p>
            </div>

            <form class="sign-up-form" method="POST">
                  <div class="sign-up-form-row">
                        <div class="sign-up-form-field">
                              <label>FIRST NAME</label>
                              <input type="text">
                        </div>

                        <div class="sign-up-form-field">
                              <label>LAST NAME</label>
                              <input type="text">
                        </div>
                  </div>

                  <div class="sign-up-form-field">
                        <label>E-MAIL</label>
                        <input type="email">
                  </div>

                  <div class="sign-up-form-row">
                        <div class="sign-up-form-field">
                              <label>PASSWORD</label>
                              <input type="password">
                        </div>

                        <div class="sign-up-form-field">
                              <label>CONFIRM YOUR PASSWORD</label>
                              <input type="password">
                        </div>
                  </div>

                  <div class="sign-up-form-submit">
                        <input type="submit" value="SIGN UP">
                  </div>
            </form>

            <div class="sign-up-card-footer">
                  <hr>
                  <p>Already have an account? <a href="1_sign_in_user_account.html">SIGN IN HERE</p>
            </div>
      </div>

      <script src="../../scripts/user-authorization.js"></script>
</body>

</html>
