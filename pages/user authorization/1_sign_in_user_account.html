
<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Sign In</title>
      <link rel="stylesheet" href="../../styles/user-authorization.css">
</head>

<body>
      <img class="sign-in-background" src="../../assets/img/sign in background.jpg">

      <a class="sign-in-logo" href="../../index.html">
            <img src="../../assets/svg/about us paw print 1.svg">
      </a>

      <div class="sign-in-card">
            <div class="sign-in-card-header">
                  <p class="sign-in-card-header-subtitle">WELCOME BACK</p>
                  <p class="sign-in-card-header-title">SIGN IN TO YOUR ACCOUNT</p>
            </div>

            <div class="sign-in-buttons">
                  <button class="sign-in-button-user-u">I'M A PET OWNER</button>
                  <a href="2_sign_in_admin_account.html" class="sign-in-button-admin-u">I'M AN ADMIN</a>
            </div>

            <form class="sign-in-form" method="POST">
                  <div class="sign-in-form-field">
                        <label>E-MAIL</label>
                        <input type="email">
                  </div>

                  <div class="sign-in-form-field">
                        <label>PASSWORD</label>
                        <input type="password">
                  </div>

                  <div class="sign-in-form-actions">
                        <input type="submit" value="SIGN IN">
                        <p>FORGOT YOUR PASSWORD?</p>
                  </div>
            </form>

            <div class="sign-in-card-footer">
                  <hr>
                  <p>Don't have an account? <a href="3_sign_up.html">SIGN UP NOW</a></p>
            </div>
      </div>

      <script src="../../scripts/user-authorization.js"></script>
</body>

</html>
